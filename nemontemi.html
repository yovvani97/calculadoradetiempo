<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    
    <title>Nemontemi: Tiempo de Introspección</title>

    <meta property="og:title" content="Nemontemi: Los Días de Guardia">
    <meta property="og:description" content="Consulta la energía de los 5 días de introspección del ciclo solar mexica.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yovvani97.github.io/calculadoradetiempo/nemontemi.html">
    <meta property="og:image" content="https://yovvani97.github.io/calculadoradetiempo/logo.png">
    
    <meta name="theme-color" content="#1a1a1a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="js/lucide.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .bg-nemontemi-header { background: linear-gradient(135deg, #1a1a1a 0%, #434343 100%); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* ==========================================================================
           DATOS Y CONSTANTES SAGRADAS (IGUALANDO MOTOR PRINCIPAL)
           ========================================================================== */
        const SIGNOS = [
            { nombre: "Cipactli", emoji: "🐊", es: "Caimán" }, { nombre: "Ehecatl", emoji: "🌬️", es: "Viento" },
            { nombre: "Calli", emoji: "🏠", es: "Casa" }, { nombre: "Cuetzpalin", emoji: "🦎", es: "Lagartija" },
            { nombre: "Coatl", emoji: "🐍", es: "Serpiente" }, { nombre: "Miquiztli", emoji: "💀", es: "Muerte" },
            { nombre: "Mazatl", emoji: "🦌", es: "Venado" }, { nombre: "Tochtli", emoji: "🐇", es: "Conejo" },
            { nombre: "Atl", emoji: "💧", es: "Agua" }, { nombre: "Itzcuintli", emoji: "🐕", es: "Perro" },
            { nombre: "Ozomatli", emoji: "🐒", es: "Mono" }, { nombre: "Malinalli", emoji: "🌿", es: "Hierba" },
            { nombre: "Acatl", emoji: "🎋", es: "Caña" }, { nombre: "Ocelotl", emoji: "🐆", es: "Jaguar" },
            { nombre: "Cuauhtli", emoji: "🦅", es: "Águila" }, { nombre: "Cozcaquauhtli", emoji: "🦃", es: "Zopilote" },
            { nombre: "Ollin", emoji: "🌀", es: "Movimiento" }, { nombre: "Tecpatl", emoji: "🔪", es: "Pedernal" },
            { nombre: "Quiahuitl", emoji: "🌧️", es: "Lluvia" }, { nombre: "Xochitl", emoji: "🌸", es: "Flor" }
        ];

        const AVES_DIA = [
            { nahuatl: "Nexhuitzillin", es: "Pájaro Espina Gris" }, { nahuatl: "Quetzahuitzillin", es: "Pájaro Espina Hermoso" },
            { nahuatl: "Tototzin", es: "Halcón" }, { nahuatl: "Zolin", es: "Codorniz" },
            { nahuatl: "Acalotl", es: "Cuervo" }, { nahuatl: "Chicoatli", es: "Lechuza" },
            { nahuatl: "Papalotl", es: "Mariposa" }, { nahuatl: "Ixcuauhtli", es: "Águila de Obsidiana" },
            { nahuatl: "Chalchiuhtotolin", es: "Guajolote" }, { nahuatl: "Tecolotl", es: "Tecolote" },
            { nahuatl: "Alotl", es: "Guacamaya" }, { nahuatl: "Quetzatototl", es: "Pájaro Quetzal" },
            { nahuatl: "Toznene", es: "Papagayo" }
        ];

        const SENORES_NOCHE = [
            { nombre: "Xiuhtecuhtli" }, { nombre: "Itztli" }, { nombre: "Piziltecuhtli" },
            { nombre: "Centeotl" }, { nombre: "Mictlantecuhtli" }, { nombre: "Chalchihuitlicue" },
            { nombre: "Tlazoltéotl" }, { nombre: "Tepeyólotl" }, { nombre: "Tláloc" }
        ];

        const ACOMPANANTES_NOCHE = [
            { nahuatl: "Colotl", es: "Escorpión" }, { nahuatl: "Tzinacantli", es: "Murciélago" },
            { nahuatl: "Coyotl", es: "Coyote" }, { nahuatl: "Tocatl", es: "Araña" },
            { nahuatl: "Tecolotl", es: "Tecolote" }, { nahuatl: "Coatl", es: "Serpiente" },
            { nahuatl: "Izpapalotl", es: "Mariposa de Obsidiana" }, { nahuatl: "Ocelotl", es: "Jaguar" },
            { nahuatl: "Petlalzocoatl", es: "Ciempiés" }
        ];

        const TIME_FRONTIERS = { CALLI: "00:43", TOCHTLI: "06:43", ACATL: "12:43", TECPATL: "18:43" };
        const RESIDUE_TABLE = {
            CALLI: [37, 25, 13, 1, 41, 29, 17, 5, 45, 33, 21, 9, 49],
            TOCHTLI: [50, 38, 26, 14, 2, 42, 30, 18, 6, 46, 34, 22, 10],
            ACATL: [11, 51, 39, 27, 15, 3, 43, 31, 19, 7, 47, 35, 23],
            TECPATL: [24, 12, 0, 40, 28, 16, 4, 44, 32, 20, 8, 48, 36]
        };
        const NEMONTEMI_SEQUENCES = {
            TOCHTLI: ["Cipactli", "Ehecatl", "Calli", "Cuetzpalin", "Coatl"],
            ACATL: ["Miquiztli", "Mazatl", "Tochtli", "Atl", "Itzcuintli"],
            TECPATL: ["Ozomatli", "Malinalli", "Acatl", "Ocelotl", "Cuauhtli"],
            CALLI: ["Cozcaquauhtli", "Ollin", "Tecpatl", "Quiahuitl", "Xochitl"]
        };
        const NUMERAL_START = [1, 6, 11, 3, 8, 13, 5, 10, 2, 7, 12, 4, 9];

        /* ==========================================================================
           COMPONENTES UI
           ========================================================================== */
        const CardResult = ({ title, main, sub, icon }) => (
            <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
                <div className="mb-2 text-3xl">{icon}</div>
                <div className="text-[9px] font-bold tracking-widest text-gray-400 uppercase mb-1">{title}</div>
                <div className="text-base font-bold text-gray-800 leading-tight">{main}</div>
                <div className="text-[10px] text-gray-500 font-medium">{sub}</div>
            </div>
        );

        /* ==========================================================================
           APLICACIÓN
           ========================================================================== */
        const App = () => {
            const [resultado, setResultado] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const f = params.get('fecha'), h = params.get('hora');
                if (f && h) calculate(f, h);
                else window.location.href = 'index.html';
                lucide.createIcons();
            }, []);

            const calculate = (fechaStr, horaStr) => {
                const [anioI, mesI, diaI] = fechaStr.split('-').map(Number);
                const [hI, mI] = horaStr.split(':').map(Number);
                const baseYear = (mesI < 3 || (mesI === 3 && diaI < 12)) ? anioI - 1 : anioI;
                const residue = baseYear % 52;
                
                let yearType = "", yearNum = 0;
                for (const [type, list] of Object.entries(RESIDUE_TABLE)) {
                    const idx = list.indexOf(residue);
                    if (idx !== -1) { yearType = type; yearNum = idx + 1; break; }
                }

                const [fH, fM] = TIME_FRONTIERS[yearType].split(':').map(Number);
                let effectiveDay = (hI * 60 + mI < fH * 60 + fM) ? diaI - 1 : diaI;
                let nemStartDay = (yearType === 'ACATL' || yearType === 'TECPATL') ? 6 : 7;
                let dayIdx = effectiveDay - nemStartDay;

                if (dayIdx >= 0 && dayIdx < 5) {
                    const nombreSigno = NEMONTEMI_SEQUENCES[yearType][dayIdx];
                    const signoObj = SIGNOS.find(s => s.nombre === nombreSigno);
                    const indiceSigno = SIGNOS.findIndex(s => s.nombre === nombreSigno);
                    const finalNumeral = (NUMERAL_START[yearNum - 1] + dayIdx - 1) % 13 + 1;

                    // Nahual y Trecena
                    const nahualObj = SIGNOS[(indiceSigno + 10) % 20];
                    let idxTrecena = (indiceSigno - (finalNumeral - 1)) % 20;
                    if (idxTrecena < 0) idxTrecena += 20;

                    // Aves y Señores (Lógica de Motor Principal)
                    let tonalIndex = -1;
                    for (let i = 0; i < 260; i++) {
                        if (i % 13 === (finalNumeral - 1) && i % 20 === indiceSigno) { tonalIndex = i; break; }
                    }

                    setResultado({
                        numeral: finalNumeral,
                        signo: signoObj,
                        nahual: nahualObj,
                        trecena: SIGNOS[idxTrecena],
                        ave: AVES_DIA[finalNumeral - 1],
                        noche: SENORES_NOCHE[tonalIndex % 9],
                        acomp: ACOMPANANTES_NOCHE[tonalIndex % 9],
                        anio: `${yearNum} ${yearType}`,
                        diaNem: dayIdx + 1
                    });
                } else { window.location.href = 'index.html'; }
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
                        <div className="pt-10 pb-8 px-8 text-center bg-nemontemi-header text-white">
                            <h1 className="text-3xl font-bold tracking-tight mb-2 uppercase">Nemontemi</h1>
                            <p className="opacity-60 text-[10px] font-bold uppercase tracking-[0.3em]">El Tiempo de la Introspección</p>
                        </div>

                        <div className="px-6 py-6 space-y-4">
                            {resultado ? (
                                <>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="col-span-1 row-span-2 bg-gradient-to-br from-gray-800 to-black rounded-3xl p-6 text-white flex flex-col items-center justify-center shadow-xl">
                                            <div className="text-[9px] font-bold opacity-50 uppercase tracking-widest mb-2 text-center">Tonal Nemontemi</div>
<img 
  src={`img/signos/${SIGNOS.findIndex(s => s.nombre === resultado.signo.nombre) + 1}.png`} 
  alt={resultado.signo.nombre}
  className="w-24 h-24 object-contain my-2"
/>                                            <div className="text-4xl font-black">{resultado.numeral}</div>
<div className="text-sm font-bold uppercase tracking-wider mt-2">
  {resultado.signo.nombre}
</div>
<div className="text-[10px] text-gray-400 uppercase tracking-[0.3em]">
  {resultado.signo.es}
</div>                                        </div>

                                        <CardResult title="Nahual" main={resultado.nahual.nombre} sub={resultado.nahual.es} icon={resultado.nahual.emoji} />
                                        <CardResult title="Trecena" main={resultado.trecena.nombre} sub="Rige el ciclo" icon={resultado.trecena.emoji} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-emerald-50 rounded-2xl p-4 text-center border border-emerald-100">
                                            <div className="text-[9px] uppercase font-bold text-gray-400">Ave Sagrada</div>
                                            <div className="text-xs font-bold text-gray-800">{resultado.ave.nahuatl}</div>
                                            <div className="text-[9px] text-emerald-600 italic">{resultado.ave.es}</div>
                                        </div>
                                        <div className="bg-slate-900 rounded-2xl p-4 text-center text-white">
                                            <div className="text-[9px] uppercase font-bold text-slate-500">Señor Noche</div>
                                            <div className="text-xs font-bold">{resultado.noche.nombre}</div>
                                            <div className="text-[9px] text-indigo-300">{resultado.acomp.nahuatl}</div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 rounded-2xl p-4 text-center border border-slate-100">
                                        <div className="text-[9px] font-bold text-gray-400 uppercase">Contexto Anual</div>
                                        <div className="text-sm font-bold text-slate-700 uppercase">{resultado.anio} • Día {resultado.diaNem} de 5</div>
                                    </div>

                                    <button onClick={() => window.location.href='index.html'} 
                                            className="w-full py-4 rounded-2xl font-bold text-gray-400 border border-gray-100 hover:bg-gray-50 transition-all flex items-center justify-center gap-2 text-[10px] uppercase tracking-widest">
                                        <i data-lucide="arrow-left" className="w-4 h-4"></i> Salir del Nemontemi
                                    </button>
                                </>
                            ) : (
                                <div className="py-20 text-center"><p className="text-gray-400 animate-pulse">Calculando...</p></div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
