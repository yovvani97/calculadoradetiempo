<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <title>Nemontemi: Tiempo de Introspección</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .bg-nemontemi-header { background: linear-gradient(135deg, #000000 0%, #2d2d2d 100%); }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONSTANTES ---
        const SIGNOS = [
            { nombre: "Cipactli", emoji: "🐊", es: "Caimán" }, { nombre: "Ehecatl", emoji: "🌬️", es: "Viento" },
            { nombre: "Calli", emoji: "🏠", es: "Casa" }, { nombre: "Cuetzpalin", emoji: "🦎", es: "Lagartija" },
            { nombre: "Coatl", emoji: "🐍", es: "Serpiente" }, { nombre: "Miquiztli", emoji: "💀", es: "Muerte" },
            { nombre: "Mazatl", emoji: "🦌", es: "Venado" }, { nombre: "Tochtli", emoji: "🐇", es: "Conejo" },
            { nombre: "Atl", emoji: "💧", es: "Agua" }, { nombre: "Itzcuintli", emoji: "🐕", es: "Perro" },
            { nombre: "Ozomatli", emoji: "🐒", es: "Mono" }, { nombre: "Malinalli", emoji: "🌿", es: "Hierba" },
            { nombre: "Acatl", emoji: "🎋", es: "Caña" }, { nombre: "Ocelotl", emoji: "🐆", es: "Jaguar" },
            { nombre: "Cuauhtli", emoji: "🦅", es: "Águila" }, { nombre: "Cozcaquauhtli", emoji: "🦃", es: "Zopilote" },
            { nombre: "Ollin", emoji: "🌀", es: "Movimiento" }, { nombre: "Tecpatl", emoji: "🔪", es: "Pedernal" },
            { nombre: "Quiahuitl", emoji: "🌧️", es: "Lluvia" }, { nombre: "Xochitl", emoji: "🌸", es: "Flor" }
        ];

        const AVES_DIA = [
            { nahuatl: "Nexhuitzillin", es: "Pájaro Espina" }, { nahuatl: "Quetzahuitzillin", es: "Pájaro Hermoso" },
            { nahuatl: "Tototzin", es: "Halcón" }, { nahuatl: "Zolin", es: "Codorniz" },
            { nahuatl: "Acalotl", es: "Cuervo" }, { nahuatl: "Chicoatli", es: "Lechuza" },
            { nahuatl: "Papalotl", es: "Mariposa" }, { nahuatl: "Ixcuauhtli", es: "Águila Obsidiana" },
            { nahuatl: "Chalchiuhtotolin", es: "Guajolote" }, { nahuatl: "Tecolotl", es: "Tecolote" },
            { nahuatl: "Alotl", es: "Guacamaya" }, { nahuatl: "Quetzatototl", es: "Quetzal" },
            { nahuatl: "Toznene", es: "Papagayo" }
        ];

        const SENORES_NOCHE = [{ nombre: "Xiuhtecuhtli" }, { nombre: "Itztli" }, { nombre: "Piziltecuhtli" }, { nombre: "Centeotl" }, { nombre: "Mictlantecuhtli" }, { nombre: "Chalchihuitlicue" }, { nombre: "Tlazoltéotl" }, { nombre: "Tepeyólotl" }, { nombre: "Tláloc" }];
        const ACOMPANANTES_NOCHE = [{ nahuatl: "Colotl" }, { nahuatl: "Tzinacantli" }, { nahuatl: "Coyotl" }, { nahuatl: "Tocatl" }, { nahuatl: "Tecolotl" }, { nahuatl: "Coatl" }, { nahuatl: "Izpapalotl" }, { nahuatl: "Ocelotl" }, { nahuatl: "Petlalzocoatl" }];
        
        const TIME_FRONTIERS = { CALLI: "00:43", TOCHTLI: "06:43", ACATL: "12:43", TECPATL: "18:43" };
        const RESIDUE_TABLE = {
            CALLI: [37, 25, 13, 1, 41, 29, 17, 5, 45, 33, 21, 9, 49],
            TOCHTLI: [50, 38, 26, 14, 2, 42, 30, 18, 6, 46, 34, 22, 10],
            ACATL: [11, 51, 39, 27, 15, 3, 43, 31, 19, 7, 47, 35, 23],
            TECPATL: [24, 12, 0, 40, 28, 16, 4, 44, 32, 20, 8, 48, 36]
        };
        const NEMONTEMI_SEQUENCES = {
            TOCHTLI: ["Cipactli", "Ehecatl", "Calli", "Cuetzpalin", "Coatl"],
            ACATL: ["Miquiztli", "Mazatl", "Tochtli", "Atl", "Itzcuintli"],
            TECPATL: ["Ozomatli", "Malinalli", "Acatl", "Ocelotl", "Cuauhtli"],
            CALLI: ["Cozcaquauhtli", "Ollin", "Tecpatl", "Quiahuitl", "Xochitl"]
        };
        const NUMERAL_START = [1, 6, 11, 3, 8, 13, 5, 10, 2, 7, 12, 4, 9];

        const CardResult = ({ title, main, sub, icon }) => (
            <div className="bg-white rounded-3xl p-4 shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
                <div className="text-xl mb-1">{icon}</div>
                <div className="text-[8px] font-bold tracking-widest text-gray-400 uppercase mb-1">{title}</div>
                <div className="text-xs font-bold text-gray-800 leading-tight">{main}</div>
                <div className="text-[8px] text-gray-400 font-medium uppercase">{sub}</div>
            </div>
        );

        const App = () => {
            const [resultado, setResultado] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const f = params.get('fecha'), h = params.get('hora');
                if (f && h) calculate(f, h);
                else window.location.href = 'index.html';
            }, []);

            const calculate = (fechaStr, horaStr) => {
                const [anioI, mesI, diaI] = fechaStr.split('-').map(Number);
                const [hI, mI] = horaStr.split(':').map(Number);
                const baseYear = (mesI < 3 || (mesI === 3 && diaI < 12)) ? anioI - 1 : anioI;
                const residue = baseYear % 52;
                
                let yearType = "", yearNum = 0;
                for (const [type, list] of Object.entries(RESIDUE_TABLE)) {
                    const idx = list.indexOf(residue);
                    if (idx !== -1) { yearType = type; yearNum = idx + 1; break; }
                }

                if (!yearType) return window.location.href = 'index.html';

                const [fH, fM] = TIME_FRONTIERS[yearType].split(':').map(Number);
                let effectiveDay = (hI * 60 + mI < fH * 60 + fM) ? diaI - 1 : diaI;
                let nemStartDay = (yearType === 'ACATL' || yearType === 'TECPATL') ? 6 : 7;
                let dayIdx = effectiveDay - nemStartDay;

                if (dayIdx < 0 || dayIdx > 4 || mesI !== 3) {
                    window.location.href = 'index.html';
                    return;
                }

                const nombreSigno = NEMONTEMI_SEQUENCES[yearType][dayIdx];
                const signoObj = SIGNOS.find(s => s.nombre === nombreSigno);
                const indiceSigno = SIGNOS.findIndex(s => s.nombre === nombreSigno);
                const finalNumeral = (NUMERAL_START[yearNum - 1] + dayIdx - 1) % 13 + 1;

                let tonalIndex = -1;
                for (let i = 0; i < 260; i++) {
                    if (i % 13 === (finalNumeral - 1) && i % 20 === indiceSigno) { tonalIndex = i; break; }
                }

                setResultado({
                    numeral: finalNumeral,
                    signo: signoObj,
                    signoNum: indiceSigno + 1,
                    nahual: SIGNOS[(indiceSigno + 10) % 20],
                    trecena: SIGNOS[(indiceSigno - (finalNumeral - 1) + 20) % 20],
                    ave: AVES_DIA[finalNumeral - 1],
                    noche: SENORES_NOCHE[tonalIndex % 9],
                    acomp: ACOMPANANTES_NOCHE[tonalIndex % 9],
                    anio: `${yearNum} ${yearType}`,
                    diaNem: dayIdx + 1
                });
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden">
                        
                        <div className="pt-10 pb-6 px-8 text-center bg-nemontemi-header text-white">
                            <h1 className="text-3xl font-bold tracking-tight">Nemontemi</h1>
                            <p className="opacity-50 text-[10px] font-bold uppercase tracking-[0.3em] mt-1">Días de Guardia</p>
                        </div>

                        <div className="px-6 py-8">
                            {resultado ? (
                                <div className="fade-in space-y-4">
                                    {/* Card Principal Estilo Index */}
                                    <div className="bg-white rounded-3xl p-6 border border-gray-100 shadow-xl text-center">
                                        <div className="w-32 h-32 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-gray-100 shadow-inner">
                                            <img 
                                                src={`signos/${resultado.signoNum}.png`} 
                                                className="w-24 h-24 object-contain" 
                                                alt="Signo"
                                                onError={(e) => { e.target.src = "https://via.placeholder.com/100?text=Nemontemi"; }}
                                            />
                                        </div>
                                        <h2 className="text-3xl font-black text-gray-900 leading-tight">
                                            {resultado.numeral} {resultado.signo.nombre}
                                        </h2>
                                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6">
                                            (Día {resultado.diaNem} del Tiempo de Guardia)
                                        </p>

                                        {/* Grid de Detalles */}
                                        <div className="grid grid-cols-2 gap-3 text-left">
                                            <CardResult title="Nahual" main={resultado.nahual.nombre} sub={resultado.nahual.es} icon={resultado.nahual.emoji} />
                                            <CardResult title="Trecena" main={resultado.trecena.nombre} sub="Rige el ciclo" icon={resultado.trecena.emoji} />
                                            
                                            <div className="bg-emerald-50 rounded-2xl p-4 border border-emerald-100">
                                                <span className="text-[8px] font-bold text-emerald-800 uppercase block mb-1">Ave Sagrada</span>
                                                <p className="text-[11px] font-bold text-emerald-900">{resultado.ave.nahuatl}</p>
                                                <p className="text-[9px] text-emerald-600 italic">{resultado.ave.es}</p>
                                            </div>

                                            <div className="bg-slate-900 rounded-2xl p-4 border border-slate-700 text-white">
                                                <span className="text-[8px] font-bold text-slate-400 uppercase block mb-1">Señor Noche</span>
                                                <p className="text-[11px] font-bold">{resultado.noche.nombre}</p>
                                                <p className="text-[9px] text-indigo-300">{resultado.acomp.nahuatl}</p>
                                            </div>
                                        </div>

                                        <div className="mt-6 bg-gray-50 rounded-2xl p-3 border border-gray-100">
                                            <p className="text-[9px] font-bold text-gray-400 uppercase">Contexto Anual</p>
                                            <p className="text-xs font-bold text-gray-700 uppercase">{resultado.anio}</p>
                                        </div>
                                    </div>

                                    <button onClick={() => window.location.href='index.html'} 
                                            className="w-full py-4 rounded-2xl font-bold text-gray-400 border border-gray-100 hover:bg-gray-50 transition-all text-[10px] uppercase tracking-widest">
                                        ← Salir del Tiempo de Guardia
                                    </button>
                                </div>
                            ) : (
                                <div className="py-20 text-center">
                                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900 mx-auto mb-4"></div>
                                    <p className="text-gray-400 text-xs font-bold uppercase tracking-widest">Calculando...</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
