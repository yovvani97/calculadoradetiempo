<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Nemontemi - Tonalpohualli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .bg-nemontemi { background: linear-gradient(135deg, #1a1a1a 0%, #2d3436 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const TIME_FRONTIERS = { CALLI: "00:43", TOCHTLI: "06:43", ACATL: "12:43", TECPATL: "18:43" };
        const RESIDUE_TABLE = {
            CALLI: [37, 25, 13, 1, 41, 29, 17, 5, 45, 33, 21, 9, 49],
            TOCHTLI: [50, 38, 26, 14, 2, 42, 30, 18, 6, 46, 34, 22, 10],
            ACATL: [11, 51, 39, 27, 15, 3, 43, 31, 19, 7, 47, 35, 23],
            TECPATL: [24, 12, 0, 40, 28, 16, 4, 44, 32, 20, 8, 48, 36]
        };
        const NEMONTEMI_SEQUENCES = {
            TOCHTLI: ["Cipactli", "Ehecatl", "Calli", "Cuetzpalin", "Coatl"],
            ACATL: ["Miquiztli", "Mazatl", "Tochtli", "Atl", "Itzcuintli"],
            TECPATL: ["Ozomahtli", "Malinalli", "Acatl", "Ocelotl", "Cuauhtli"],
            CALLI: ["Cozcacuauhtli", "Ollin", "Tecpatl", "Quiahuitl", "Xochitl"]
        };
        const NUMERAL_START = [1, 6, 11, 3, 8, 13, 5, 10, 2, 7, 12, 4, 9];

        const App = () => {
            const [fecha, setFecha] = useState("");
            const [hora, setHora] = useState("");
            const [resultado, setResultado] = useState(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('fecha')) {
                    setFecha(params.get('fecha'));
                    setHora(params.get('hora'));
                    calculate(params.get('fecha'), params.get('hora'));
                }
                lucide.createIcons();
            }, []);

            const calculate = (f, h) => {
                const [anioI, mesI, diaI] = f.split('-').map(Number);
                if (mesI !== 3 || diaI < 6 || diaI > 11) {
                    window.location.href = 'index.html';
                    return;
                }

                const baseYear = (mesI < 3 || (mesI === 3 && diaI < 12)) ? anioI - 1 : anioI;
                const residue = baseYear % 52;
                let yearType = "", yearNum = 0;

                for (const [type, list] of Object.entries(RESIDUE_TABLE)) {
                    const idx = list.indexOf(residue);
                    if (idx !== -1) { yearType = type; yearNum = idx + 1; break; }
                }

                const frontier = TIME_FRONTIERS[yearType];
                let effectiveDay = (h < frontier) ? diaI - 1 : diaI;
                let nemStartDay = (yearType === 'ACATL' || yearType === 'TECPATL') ? 6 : 7;
                
                if (effectiveDay >= nemStartDay && effectiveDay <= 10) {
                    const dayIdx = effectiveDay - nemStartDay;
                    const startNum = NUMERAL_START[yearNum - 1];
                    setResultado({
                        numeral: (startNum + dayIdx - 1) % 13 + 1,
                        signo: NEMONTEMI_SEQUENCES[yearType][dayIdx],
                        anio: `${yearNum} ${yearType}`,
                        diaNem: dayIdx + 1
                    });
                } else {
                    window.location.href = 'index.html';
                }
            };

            return (
                <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
                        <div className="pt-10 pb-6 px-8 text-center bg-nemontemi text-white">
                            <h1 className="text-3xl font-bold tracking-tight mb-2">NEMONTEMI</h1>
                            <p className="opacity-70 text-xs font-medium uppercase tracking-widest">Días de Silencio y Reserva</p>
                        </div>

                        <div className="p-8">
                            {resultado ? (
                                <div className="space-y-6">
                                    <div className="bg-slate-50 border border-slate-100 rounded-3xl p-8 text-center">
                                        <div className="text-[10px] font-bold text-red-600 uppercase tracking-widest mb-4">Influencia Detectada</div>
                                        <div className="text-6xl font-black text-slate-800 mb-2">{resultado.numeral}</div>
                                        <div className="text-2xl font-bold text-slate-700 uppercase tracking-widest">{resultado.signo}</div>
                                        <div className="mt-4 text-xs text-slate-400 font-medium">Día {resultado.diaNem} del ciclo Nemontemi</div>
                                    </div>

                                    <div className="bg-slate-900 rounded-2xl p-4 text-white text-center">
                                        <div className="text-[9px] font-bold text-gray-400 uppercase">Año Regente</div>
                                        <div className="text-sm font-bold">{resultado.anio}</div>
                                    </div>

                                    <button onClick={() => window.location.href='index.html'} 
                                            className="w-full py-4 rounded-2xl font-bold text-slate-400 border border-slate-100 hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                                        <i data-lucide="arrow-left" className="w-4 h-4"></i> Volver a Cuenta Normal
                                    </button>
                                </div>
                            ) : (
                                <p className="text-center text-gray-400 py-10">Validando periodo Nemontemi...</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
