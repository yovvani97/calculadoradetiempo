<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nemontemi: Tiempo de Introspección</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-text: #1d1d1f;
            --mexica-red: #b00e2d;
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--apple-bg); 
            color: var(--apple-text);
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner-mexica {
            animation: rotateGrecas 0.6s linear infinite;
            will-change: transform;
        }
        @keyframes rotateGrecas {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glass-dark {
            background: rgba(29, 29, 31, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA MANTENIDA DE TU LÓGICA ---
        const DESCRIPCIONES = {
            "Cipactli": "Inicio y fuerza creadora primordial. Proyectos con bases sólidas.",
            "Ehecatl": "Comunicación y espíritu. Invita a la flexibilidad.",
            "Calli": "Refugio y mente. Fortalece el hogar interno.",
            "Cuetzpalin": "Regeneración y agilidad. Capacidad de sanar.",
            "Coatl": "Energía vital y transformación espiritual.",
            "Miquiztli": "Quietud y reflexión. Soltar lo que ya no sirve.",
            "Mazatl": "Intuición y vigilancia. Conexión con lo divino.",
            "Tochtli": "Fertilidad y previsión. Disfrutar los frutos.",
            "Atl": "Purificación emocional. Limpieza del espíritu.",
            "Itzcuintli": "Lealtad y protección. El guía fiel del alma.",
            "Ozomatli": "Alegría y arte. Celebrar la creatividad.",
            "Malinalli": "Tenacidad y renovación constante.",
            "Acatl": "Autoridad espiritual y rectitud.",
            "Ocelotl": "Valentía y visión en la oscuridad.",
            "Cuauhtli": "Visión elevada y libertad total.",
            "Cozcaquauhtli": "Sabiduría, paciencia y reciclaje de energía.",
            "Ollin": "Movimiento perpetuo y evolución constante.",
            "Tecpatl": "Verdad cortante y decisiones firmes.",
            "Quiahuitl": "Fertilidad emocional y crecimiento tras la tormenta.",
            "Xochitl": "Belleza, plenitud y florecimiento del alma."
        };

        const SIGNOS_DATA = [
            { n: "Cipactli", es: "Caimán" }, { n: "Ehecatl", es: "Viento" }, { n: "Calli", es: "Casa" }, { n: "Cuetzpalin", es: "Lagartija" }, { n: "Coatl", es: "Serpiente" },
            { n: "Miquiztli", es: "Muerte" }, { n: "Mazatl", es: "Venado" }, { n: "Tochtli", es: "Conejo" }, { n: "Atl", es: "Agua" }, { n: "Itzcuintli", es: "Perro" },
            { n: "Ozomatli", es: "Mono" }, { n: "Malinalli", es: "Hierba" }, { n: "Acatl", es: "Caña" }, { n: "Ocelotl", es: "Jaguar" }, { n: "Cuauhtli", es: "Águila" },
            { n: "Cozcaquauhtli", es: "Zopilote" }, { n: "Ollin", es: "Movimiento" }, { n: "Tecpatl", es: "Pedernal" }, { n: "Quiahuitl", es: "Lluvia" }, { n: "Xochitl", es: "Flor" }
        ];

        const AVES_DIA = [{ nahuatl: "Nexhuitzillin", es: "Pájaro Espina" }, { nahuatl: "Quetzahuitzillin", es: "Pájaro Hermoso" }, { nahuatl: "Tototzin", es: "Halcón" }, { nahuatl: "Zolin", es: "Codorniz" }, { nahuatl: "Acalotl", es: "Cuervo" }, { nahuatl: "Chicoatli", es: "Lechuza" }, { nahuatl: "Papalotl", es: "Mariposa" }, { nahuatl: "Ixcuauhtli", es: "Águila Obsidiana" }, { nahuatl: "Chalchiuhtotolin", es: "Guajolote" }, { nahuatl: "Tecolotl", es: "Tecolote" }, { nahuatl: "Alotl", es: "Guacamaya" }, { nahuatl: "Quetzatototl", es: "Quetzal" }, { nahuatl: "Toznene", es: "Papagayo" }];
        const SENORES_NOCHE = [{ n: "Xiuhtecuhtli" }, { n: "Itztli" }, { n: "Piziltecuhtli" }, { n: "Centeotl" }, { n: "Mictlantecuhtli" }, { n: "Chalchihuitlicue" }, { n: "Tlazoltéotl" }, { n: "Tepeyólotl" }, { n: "Tláloc" }];
        const RESIDUE_TABLE = { CALLI: [37, 25, 13, 1, 41, 29, 17, 5, 45, 33, 21, 9, 49], TOCHTLI: [50, 38, 26, 14, 2, 42, 30, 18, 6, 46, 34, 22, 10], ACATL: [11, 51, 39, 27, 15, 3, 43, 31, 19, 7, 47, 35, 23], TECPATL: [24, 12, 0, 40, 28, 16, 4, 44, 32, 20, 8, 48, 36] };
        const NEMONTEMI_SEQUENCES = { TOCHTLI: ["Cipactli", "Ehecatl", "Calli", "Cuetzpalin", "Coatl"], ACATL: ["Miquiztli", "Mazatl", "Tochtli", "Atl", "Itzcuintli"], TECPATL: ["Ozomatli", "Malinalli", "Acatl", "Ocelotl", "Cuauhtli"], CALLI: ["Cozcaquauhtli", "Ollin", "Tecpatl", "Quiahuitl", "Xochitl"] };
        const NUMERAL_START = [1, 6, 11, 3, 8, 13, 5, 10, 2, 7, 12, 4, 9];

        const App = () => {
            const [res, setRes] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const f = params.get('fecha'), h = params.get('hora');
                
                const timer = setTimeout(() => {
                    if (f && h) {
                        calculate(f, h);
                        setLoading(false);
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1200);
                return () => clearTimeout(timer);
            }, []);

            const calculate = (fechaStr, horaStr) => {
                const [y, m, d] = fechaStr.split('-').map(Number);
                const [hh, mm] = horaStr.split(':').map(Number);
                const baseYear = (m < 3 || (m === 3 && d < 12)) ? y - 1 : y;
                const residue = baseYear % 52;
                
                let yType = ""; let yNum = 0;
                for (const [type, list] of Object.entries(RESIDUE_TABLE)) {
                    const idx = list.indexOf(residue);
                    if (idx !== -1) { yType = type; yNum = idx + 1; break; }
                }
                if (!yType) return;

                const frontiers = { CALLI: [0,43], TOCHTLI: [6,43], ACATL: [12,43], TECPATL: [18,43] };
                const [fH, fM] = frontiers[yType];
                let effDay = (hh * 60 + mm < fH * 60 + fM) ? d - 1 : d;
                let nemStart = (yType === 'ACATL' || yType === 'TECPATL') ? 6 : 7;
                let dayIdx = effDay - nemStart;

                if (dayIdx < 0 || dayIdx > 4 || m !== 3) return;

                const sName = NEMONTEMI_SEQUENCES[yType][dayIdx];
                const sIdx = SIGNOS_DATA.findIndex(s => s.n === sName);
                const numeral = (NUMERAL_START[yNum - 1] + dayIdx - 1) % 13 + 1;
                let tonalIndex = 0;
                for (let i = 0; i < 260; i++) { if (i % 13 === (numeral - 1) && i % 20 === sIdx) { tonalIndex = i; break; } }

                setRes({
                    numeral, sName, sEsp: SIGNOS_DATA[sIdx].es,
                    imgNum: sIdx + 1, diaNem: dayIdx + 1,
                    desc: DESCRIPCIONES[sName], ave: AVES_DIA[numeral - 1],
                    noche: SENORES_NOCHE[tonalIndex % 9], anio: `${yNum} ${yType}`
                });
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center" style={{ backgroundColor: '#b00e2d' }}>
                        <div className="w-24 h-24 mb-6">
                            <svg className="spinner-mexica w-full h-full text-white/20" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" strokeWidth="2" />
                                <circle cx="50" cy="50" r="45" fill="none" stroke="white" strokeWidth="4" strokeDasharray="60 200" strokeLinecap="round" />
                            </svg>
                        </div>
                        <h2 className="text-white text-[10px] font-bold uppercase tracking-[0.4em] opacity-80">
                            Calculando Nemontemi...
                        </h2>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.8rem] shadow-2xl border border-gray-100 overflow-hidden fade-in">
                        
                        {/* Header Estilo Apple Dark */}
                        <div className="pt-12 pb-8 px-8 text-center glass-dark text-white">
                            <span className="inline-block px-3 py-1 rounded-full bg-white/10 text-[9px] font-bold uppercase tracking-widest mb-3">
                                Tiempo de Guardia
                            </span>
                            <h1 className="text-4xl font-extrabold tracking-tight">Nemontemi</h1>
                            <p className="opacity-60 text-[11px] font-medium mt-2">Día {res.diaNem} de 5 • Introspección</p>
                        </div>

                        <div className="px-8 py-10 text-center">
                            {/* Glifo */}
                            <div className="w-36 h-36 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6 border border-gray-100 shadow-inner">
                                <img src={`img/glifo-${res.imgNum}.png`} className="w-28 h-28 object-contain" alt={res.sName} 
                                     onError={(e) => { e.target.src = "https://via.placeholder.com/150?text=Nemontemi"; }} />
                            </div>

                            {/* Título Principal */}
                            <h2 className="text-4xl font-black text-gray-900 leading-tight">
                                {res.numeral} {res.sName}
                            </h2>
                            <p className="text-[10px] font-bold text-red-700 uppercase tracking-[0.2em] mb-6">
                                ({res.sEsp})
                            </p>

                            {/* Descripción Card */}
                            <div className="mb-8 p-6 bg-gray-50 rounded-[2rem] border border-gray-100">
                                <p className="text-sm text-gray-600 leading-relaxed italic">"{res.desc}"</p>
                            </div>

                            {/* Grid de Atributos */}
                            <div className="grid grid-cols-2 gap-4 text-left">
                                <div className="bg-[#f5f5f7] rounded-3xl p-5 border border-gray-200/50">
                                    <span className="text-[9px] font-bold text-gray-400 uppercase block mb-1 tracking-tighter">Ave del día</span>
                                    <p className="text-[13px] font-extrabold text-gray-900">{res.ave.nahuatl}</p>
                                    <p className="text-[10px] text-gray-500 italic">{res.ave.es}</p>
                                </div>
                                <div className="bg-[#f5f5f7] rounded-3xl p-5 border border-gray-200/50">
                                    <span className="text-[9px] font-bold text-gray-400 uppercase block mb-1 tracking-tighter">Señor de la Noche</span>
                                    <p className="text-[13px] font-extrabold text-gray-900">{res.noche.n}</p>
                                    <p className="text-[10px] text-gray-500 italic">Guía Nocturno</p>
                                </div>
                            </div>

                            {/* Info Año */}
                            <div className="mt-8 pt-6 border-t border-gray-100">
                                <div className="inline-flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                        Año {res.anio}
                                    </p>
                                </div>
                            </div>

                            <button onClick={() => window.location.href='index.html'} 
                                    className="w-full mt-10 py-5 rounded-2xl font-bold text-gray-900 bg-gray-100 hover:bg-gray-200 transition-all text-xs uppercase tracking-widest active:scale-95">
                                Volver a la Calculadora
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
