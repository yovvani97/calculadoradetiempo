    const SECUENCIA_VEINTENA = [1, 8, 2, 9, 3, 10, 4, 11, 5, 12, 6, 13, 7];

    function calcularTonalli(fechaStr, horaStr) {
        if (!fechaStr || !horaStr) return null;
        const [yearStr, monthStr, dayStr] = fechaStr.split('-');
        const [hourStr, minuteStr] = horaStr.split(':');
        let anio = parseInt(yearStr);
        let mes = parseInt(monthStr);
        let dia = parseInt(dayStr);
        let hora = parseInt(hourStr);
        let minuto = parseInt(minuteStr);
        let fechaInput = new Date(anio, mes - 1, dia, hora, minuto);
        let residuo = ((anio % 52) + 52) % 52;
        let datosAnio = TABLA_ANIOS[residuo];
        if (!datosAnio) return null;
        
        let diaInicioAnio = 12;
        let horaInicio = 0, minInicio = 43;
        if (datosAnio.s === "Tochtli") horaInicio = 6;
        if (datosAnio.s === "Acatl")   horaInicio = 12;
        if (datosAnio.s === "Tecpatl") { horaInicio = 18; diaInicioAnio = 11; }
        
        let inicioAnioGregoriano = new Date(anio, 2, diaInicioAnio, horaInicio, minInicio); 
        if (fechaInput < inicioAnioGregoriano) {
            anio -= 1;
            residuo = anio % 52;
            datosAnio = TABLA_ANIOS[residuo];
        }

        let floatNac = hora + (minuto / 60.0);
        let floatIni = horaInicio + (minInicio / 60.0);
        let fechaCalculo = new Date(fechaInput);
        if (floatNac < floatIni) { fechaCalculo.setDate(fechaCalculo.getDate() - 1); }

        let candidatos = [];
        for (let v of VEINTENAS) {
            let yV = anio;
            if (v.m < 3 || v.nombre === "Nemontemi") yV = anio + 1; 
            let fechaV = new Date(yV, v.m - 1, v.d - (datosAnio.s === "Tecpatl" ? 1 : 0));
            if (fechaV <= fechaCalculo) { candidatos.push({ v, fechaV }); }
        }
        candidatos.sort((a, b) => a.fechaV - b.fechaV);
        let seleccion = candidatos[candidatos.length - 1];
        let veintena = seleccion.v;

        if (veintena.nombre === "Nemontemi") return { nemontemi: true };

        const diffDays = Math.floor(Math.abs(fechaCalculo - seleccion.fechaV) / (1000 * 60 * 60 * 24)); 
        let indiceSigno = (0 + diffDays) % 20;
        let signoObj = SIGNOS[indiceSigno];
        
        // 👈 AQUÍ ESTÁ LA CORRECCIÓN CLAVE: signoNum es el índice + 1
        let signoNum = indiceSigno + 1;

        let idxSecuencia = SECUENCIA_VEINTENA.indexOf(datosAnio.b);
        let numeralInicio = SECUENCIA_VEINTENA[(idxSecuencia + (veintena.id - 1)) % 13];
        let numeral = (numeralInicio + diffDays - 1) % 13 + 1;

        return {
            signoNum: signoNum, // 👈 Se agrega para que la imagen cargue
            signo: signoObj.es,
            tonal: { n: numeral, s: signoObj.nombre, emoji: signoObj.emoji }
        };
    }

                {loading ? "Procesando..." : "Revelar Destino"}

            <div className="px-6 py-8">

{resultado && typeof resultado === "object" && (
    
    <div className="fade-in">
      {resultado.nemontemi ? (
        <div className="bg-red-50 border border-red-100 rounded-3xl p-8 text-center animate-pulse">
          <h2 className="text-2xl font-bold text-red-700">Nemontemi</h2>
          <p className="text-red-600/80 text-sm">
            Días de reflexión. No hay Tonal asignado.
          </p>
        </div>
      ) : (
        <div className="bg-white rounded-3xl p-6 shadow-2xl border border-gray-100">
          <div className="flex flex-col items-center text-center">
            
            <div className="w-40 h-40 bg-gray-50 rounded-full flex items-center justify-center mb-4 shadow-inner">
              <img 
                src={`signos/${resultado.signoNum}.png`} 
                alt={resultado.signo}
                className="w-32 h-32 object-contain drop-shadow-lg"
              />
            </div>

            <h2 className="text-4xl font-black text-red-900 mb-1 tracking-wide">
  {resultado.tonal.n} {resultado.tonal.s}
</h2>

<p className="text-xs text-gray-400 uppercase tracking-[0.3em] mb-3">
  {resultado.signo}
</p>

            <p className="text-sm font-medium text-red-700 uppercase tracking-widest mb-4">
              {INFO_DETALLADA[resultado.signoNum]?.significado}
            </p>

            <p className="text-gray-700 leading-relaxed mb-6 italic text-sm">
              "{INFO_DETALLADA[resultado.signoNum]?.desc}"
            </p>

          </div>
        </div>
      )}
    </div>
  )}

  {!resultado && !loading && (
    <p className="text-center text-gray-300 py-10 font-medium">
      Ingresa tus datos para calcular tu energía sagrada
    </p>
  )}

</div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error al registrar SW', err));
            });
        }
    </script>
</body>
</html>
