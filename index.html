<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiempo Sagrado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-text: #1d1d1f;
            --apple-card: #ffffff;
            --mexica-red: #b00e2d;
            --mexica-gold: #fde047;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenedor principal */
        .app-wrapper {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Banner Cósmico */
        .cosmic-banner {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Tarjeta de Contenido */
        .content-card {
            background: var(--apple-card);
            margin: 20px;
            padding: 24px;
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        /* Menú Inferior Estilo iOS */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 24px 0; /* Espacio extra abajo para el notch del iPhone */
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .nav-item {
            border: none;
            background: none;
            color: #86868b;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--mexica-red); }
    </style>
</head>
    <script>
    function actualizarBanner() {
        const ahora = new Date();
        
        // 1. Actualizar Reloj
        const horas = ahora.getHours().toString().padStart(2, '0');
        const minutos = ahora.getMinutes().toString().padStart(2, '0');
        document.getElementById('reloj-txt').innerText = `${horas}:${minutos}`;
        
        // 2. Actualizar Fecha
        const opciones = { weekday: 'short', day: 'numeric', month: 'short' };
        document.getElementById('fecha-txt').innerText = ahora.toLocaleDateString('es-MX', opciones).toUpperCase();

        // 3. Cálculo de Fase Lunar (Algoritmo de precisión)
        const getLuna = (date) => {
            const lp = 2551443; 
            const newMoon = new Date(1970, 0, 7, 20, 35, 0);
            const phase = ((date.getTime() - newMoon.getTime()) / 1000) % lp;
            const res = Math.floor((phase / lp) * 8);
            const fases = [
                {i:'🌑', n:'Nueva'}, {i:'🌒', n:'Creciente'}, 
                {i:'🌓', n:'Cuarto C.'}, {i:'🌔', n:'Gibosa C.'}, 
                {i:'🌕', n:'Llena'}, {i:'🌖', n:'Gibosa M.'}, 
                {i:'🌗', n:'Cuarto M.'}, {i:'🌘', n:'Menguante'}
            ];
            return fases[res];
        };

        const luna = getLuna(ahora);
        document.getElementById('luna-icon').innerText = luna.i;
        document.getElementById('luna-txt').innerText = luna.n;
    }

    // Ejecutar cada segundo
    setInterval(actualizarBanner, 1000);
    actualizarBanner(); // Carga inicial
</script>
<body>
    <div class="app-wrapper">
        
        <header class="cosmic-banner">
            <div id="reloj-container">
                <div style="font-weight: 600; font-size: 17px;" id="reloj-txt">00:00</div>
                <div style="font-size: 11px; color: #86868b;" id="fecha-txt">Cargando...</div>
            </div>
            
            <div style="text-align: right;">
                <div id="luna-icon" style="font-size: 20px;">🌑</div>
                <div id="luna-txt" style="font-size: 10px; color: #86868b; font-weight: 600;">Luna</div>
            </div>
        </header>

        <main style="flex: 1; padding-bottom: 80px;">
            
            <div id="sec-calculadora" class="content-card">
                <p style="text-align: center; color: #ccc;">Tu calculadora aparecerá aquí...</p>
            </div>

            <div id="sec-cuenta" class="content-card" style="display: none;">
                <h2 style="font-size: 24px; font-weight: 600;">La Cuenta del Tiempo</h2>
                <p style="color: #86868b;">Aquí irá la interpretación profunda de los Tonallis...</p>
            </div>
            
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="navegar('sec-calculadora')">
                <span>🧮</span> Calcular
            </button>
            <button class="nav-item" onclick="navegar('sec-cuenta')">
                <span>📖</span> Cuenta
            </button>
            <button class="nav-item">
                <span>🌿</span> Rituales
            </button>
        </nav>
    </div>

    <script>
        // Función simple para navegar entre secciones
        function navegar(id) {
            document.querySelectorAll('.content-card').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            
            // Actualizar estado activo en botones
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
